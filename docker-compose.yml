version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cyber_postgres
    environment:
      POSTGRES_DB:       cyberplatform
      POSTGRES_USER:     cyberuser
      POSTGRES_PASSWORD: cyberpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberuser -d cyberplatform"]
      interval: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cyber_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ── OWASP ZAP (Deep Scan engine — Burp-grade DAST via REST API) ────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: cyber_zap
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.key=zap-api-key
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    ports:
      - "8090:8080"      # host 8090 → ZAP 8080 (for debugging; not required)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/JSON/core/view/version/?apikey=zap-api-key"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_api
    env_file: ./backend/.env
    environment:
      ZAP_API_URL: http://zap:8080
      ZAP_API_KEY: zap-api-key
      # Reach the user's Ollama running on the HOST machine (fallback when Groq is busy)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - reports_data:/app/reports
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_worker
    env_file: ./backend/.env
    environment:
      ZAP_API_URL: http://zap:8080
      ZAP_API_KEY: zap-api-key
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - reports_data:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4

  # ── Celery Beat (scheduled tasks) ─────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_beat
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A workers.celery_app beat --loglevel=info

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: cyber_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
  reports_data:
