<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password · VENOM AI</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon venom-logo"></div>
    <div class="auth-brand-name">VENOM AI</div>
    <div class="auth-brand-tag">Reset Access</div>
  </div>

  <h1 class="auth-title">Reset your password</h1>
  <p class="auth-sub">Enter your email and we'll send you a link to set a new password. The link expires in 1 hour.</p>

  <div id="msg" class="auth-msg"></div>

  <form id="forgot-form" novalidate>
    <div class="auth-field">
      <label class="auth-label" for="email">Email</label>
      <input class="auth-input" id="email" type="email" placeholder="you@example.com" required autocomplete="email" autofocus>
    </div>
    <button type="submit" id="submit-btn" class="auth-btn">Send Reset Link</button>
  </form>

  <div class="auth-footer">
    Remembered it? <a href="/login.html" class="auth-link">Back to sign in</a>
  </div>
</div>

<script src="/auth.js"></script>
<script>
const form = document.getElementById('forgot-form');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submit-btn');

function showMsg(text, type='info') {
  msg.className = 'auth-msg show ' + type;
  msg.textContent = text;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { showMsg('Please enter your email.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending link...';
  try {
    const r = await fetch(VenomAuth.getApiBase() + '/api/auth/forgot-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    // Always succeeds (prevents enumeration). Show generic message.
    showMsg('If an account exists for this email, a reset link has been sent. Check your inbox (and spam folder).', 'success');
    btn.textContent = 'Link sent ✓';
  } catch {
    showMsg('Network error — is the API running?', 'error');
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }
});
</script>
</body>
</html>
