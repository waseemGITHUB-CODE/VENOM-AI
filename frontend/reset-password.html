<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password · VENOM AI</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon venom-logo"></div>
    <div class="auth-brand-name">VENOM AI</div>
    <div class="auth-brand-tag">New Password</div>
  </div>

  <h1 class="auth-title">Set a new password</h1>
  <p class="auth-sub">Pick a strong one. After resetting, you'll be signed out of all devices and need to log in again.</p>

  <div id="msg" class="auth-msg"></div>

  <form id="reset-form" novalidate>
    <div class="auth-field">
      <label class="auth-label" for="password">New Password</label>
      <input class="auth-input" id="password" type="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password" autofocus>
      <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
      <div class="pw-strength-label" id="pw-label">Use 8+ characters with letters, numbers & symbols</div>
    </div>
    <div class="auth-field">
      <label class="auth-label" for="confirm">Confirm Password</label>
      <input class="auth-input" id="confirm" type="password" placeholder="Re-enter your new password" required minlength="8" autocomplete="new-password">
    </div>
    <button type="submit" id="submit-btn" class="auth-btn">Update Password</button>
  </form>

  <div class="auth-footer">
    <a href="/login.html" class="auth-link">Back to sign in</a>
  </div>
</div>

<script src="/auth.js"></script>
<script>
const form = document.getElementById('reset-form');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submit-btn');
const pwInput = document.getElementById('password');
const pwBar   = document.getElementById('pw-bar');
const pwLabel = document.getElementById('pw-label');

const token = new URLSearchParams(location.search).get('token');
if (!token) {
  msg.className = 'auth-msg show error';
  msg.textContent = 'Reset link is missing the token. Use the link from your email or request a new one.';
  btn.disabled = true;
}

function showMsg(text, type='error') {
  msg.className = 'auth-msg show ' + type;
  msg.textContent = text;
}

function strength(pw) {
  let s = 0;
  if (pw.length >= 8)  s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/\d/.test(pw))   s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return Math.min(s, 4);
}
pwInput.addEventListener('input', () => {
  const s = strength(pwInput.value);
  const colors = ['#dc143c', '#ff6b00', '#ffd500', '#39ff14', '#39ff14'];
  const labels = ['Too weak',  'Weak',     'Fair',    'Strong',  'Excellent'];
  const widths = [10, 30, 55, 80, 100];
  pwBar.style.width = (pwInput.value ? widths[s] : 0) + '%';
  pwBar.style.background = colors[s];
  pwLabel.textContent = pwInput.value ? labels[s] : 'Use 8+ characters with letters, numbers & symbols';
  pwLabel.style.color = pwInput.value ? colors[s] : 'var(--muted)';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = pwInput.value;
  const confirm  = document.getElementById('confirm').value;
  if (password.length < 8) { showMsg('Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showMsg("Passwords don't match."); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Updating...';
  try {
    const r = await fetch(VenomAuth.getApiBase() + '/api/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: password }),
    });
    const data = await r.json();
    if (!r.ok) {
      showMsg(data.detail || 'Could not reset password.');
      btn.disabled = false; btn.textContent = 'Update Password';
      return;
    }
    showMsg('Password updated! Redirecting to sign in...', 'success');
    setTimeout(() => location.href = '/login.html', 1500);
  } catch {
    showMsg('Network error — is the API running?');
    btn.disabled = false; btn.textContent = 'Update Password';
  }
});
</script>
</body>
</html>
