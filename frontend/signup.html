<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up · VENOM AI</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon venom-logo"></div>
    <div class="auth-brand-name">VENOM AI</div>
    <div class="auth-brand-tag">Network Offensive Monitoring</div>
  </div>

  <h1 class="auth-title">Create your account</h1>
  <p class="auth-sub">Start scanning, monitoring, and chatting with VENOM AI. Free plan — no credit card required.</p>

  <div id="msg" class="auth-msg"></div>

  <form id="signup-form" novalidate>
    <div class="auth-field">
      <label class="auth-label" for="full_name">Full Name</label>
      <input class="auth-input" id="full_name" type="text" placeholder="Jane Doe" required autocomplete="name" autofocus>
    </div>
    <div class="auth-field">
      <label class="auth-label" for="email">Work Email</label>
      <input class="auth-input" id="email" type="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="company_name">Company (Optional)</label>
      <input class="auth-input" id="company_name" type="text" placeholder="Acme Corp" autocomplete="organization">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="password">Password</label>
      <input class="auth-input" id="password" type="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
      <div class="pw-strength-label" id="pw-label">Use 8+ characters with letters, numbers & symbols</div>
    </div>
    <button type="submit" id="submit-btn" class="auth-btn">Create Account</button>
  </form>

  <div id="oauth-block" style="display:none">
    <div class="auth-divider">OR</div>
    <button type="button" id="google-btn" class="auth-btn-secondary">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path d="M17.6 9.2c0-.6-.1-1.2-.2-1.7H9v3.3h4.8c-.2 1.1-.8 2-1.8 2.7v2.2h2.9c1.7-1.6 2.7-3.9 2.7-6.5z" fill="#4285F4"/>
        <path d="M9 18c2.4 0 4.5-.8 6-2.2l-2.9-2.2c-.8.5-1.8.9-3.1.9-2.4 0-4.4-1.6-5.1-3.8H.9v2.3C2.4 15.9 5.5 18 9 18z" fill="#34A853"/>
        <path d="M3.9 10.7c-.2-.5-.3-1.1-.3-1.7s.1-1.2.3-1.7V5h-3C.3 6.2 0 7.6 0 9s.3 2.8.9 4l3-2.3z" fill="#FBBC05"/>
        <path d="M9 3.6c1.3 0 2.5.5 3.5 1.3l2.6-2.6C13.5.9 11.4 0 9 0 5.5 0 2.4 2.1.9 5l3 2.3C4.6 5.2 6.6 3.6 9 3.6z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </button>
  </div>

  <div class="auth-footer">
    Already have an account? <a href="/login.html" class="auth-link">Sign in</a>
  </div>
</div>

<script src="/auth.js"></script>
<script>
VenomAuth.redirectIfLoggedIn('/');

const form = document.getElementById('signup-form');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submit-btn');
const pwInput = document.getElementById('password');
const pwBar   = document.getElementById('pw-bar');
const pwLabel = document.getElementById('pw-label');

function showMsg(text, type='error') {
  msg.className = 'auth-msg show ' + type;
  msg.textContent = text;
}
function clearMsg() { msg.className = 'auth-msg'; msg.textContent = ''; }

// Password strength meter
function strength(pw) {
  let s = 0;
  if (pw.length >= 8)  s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/\d/.test(pw))   s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return Math.min(s, 4);
}
pwInput.addEventListener('input', () => {
  const s = strength(pwInput.value);
  const colors = ['#dc143c', '#ff6b00', '#ffd500', '#39ff14', '#39ff14'];
  const labels = ['Too weak',  'Weak',     'Fair',    'Strong',  'Excellent'];
  const widths = [10, 30, 55, 80, 100];
  pwBar.style.width = (pwInput.value ? widths[s] : 0) + '%';
  pwBar.style.background = colors[s];
  pwLabel.textContent = pwInput.value ? labels[s] : 'Use 8+ characters with letters, numbers & symbols';
  pwLabel.style.color = pwInput.value ? colors[s] : 'var(--muted)';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsg();
  const full_name    = document.getElementById('full_name').value.trim();
  const email        = document.getElementById('email').value.trim();
  const company_name = document.getElementById('company_name').value.trim();
  const password     = pwInput.value;

  if (!full_name || !email || !password) { showMsg('Please fill in all required fields.'); return; }
  if (password.length < 8) { showMsg('Password must be at least 8 characters.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account...';
  try {
    const r = await fetch(VenomAuth.getApiBase() + '/api/auth/signup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, full_name, company_name: company_name || null }),
    });
    const data = await r.json();
    if (r.status === 429) {
      // Rate limit hit — show countdown and re-enable after 60s
      let secs = 60;
      const tick = setInterval(() => {
        secs--;
        btn.textContent = `Too many attempts — wait ${secs}s`;
        if (secs <= 0) { clearInterval(tick); btn.disabled = false; btn.textContent = 'Create Account'; }
      }, 1000);
      showMsg('Too many signup attempts from this connection. Please wait 60 seconds.', 'error');
      return;
    }
    if (!r.ok) {
      showMsg(data.detail || 'Could not create account.');
      btn.disabled = false; btn.textContent = 'Create Account';
      return;
    }
    VenomAuth.setSession(data);
    showMsg('Account created! Redirecting to email verification…', 'success');
    setTimeout(() => location.href = '/verify-pending.html', 800);
  } catch {
    showMsg('Network error — is the API running?');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});

(async () => {
  try {
    const r = await fetch(VenomAuth.getApiBase() + '/api/auth/providers');
    if (r.ok) {
      const p = await r.json();
      if (p.google) {
        document.getElementById('oauth-block').style.display = 'block';
        document.getElementById('google-btn').addEventListener('click', () => {
          location.href = VenomAuth.getApiBase() + '/api/auth/google';
        });
      }
    }
  } catch {}
})();
</script>
</body>
</html>
